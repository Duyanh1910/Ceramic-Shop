<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<title>Test Customers Pagination</title>

<style>

body{
    font-family: Arial;
    background:#f4f6f8;
    padding:40px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.grid{
    display:grid;
    grid-template-columns:repeat(auto-fill,minmax(250px,1fr));
    gap:20px;
}

.card{
    background:white;
    padding:20px;
    border-radius:10px;
    box-shadow:0 4px 10px rgba(0,0,0,0.1);
    text-align:center;
}

.avatar{
    width:100px;
    height:100px;
    border-radius:50%;
    object-fit:cover;
    margin-bottom:10px;
}

.name{
    font-weight:bold;
    font-size:18px;
}

.info{
    font-size:14px;
    color:#555;
}

.pagination{
    margin-top:30px;
    text-align:center;
}

button{
    padding:8px 16px;
    margin:5px;
    border:none;
    border-radius:5px;
    background:#007bff;
    color:white;
    cursor:pointer;
}

button:disabled{
    background:#aaa;
}

</style>
</head>

<body>

<div class="container">

<h2>Danh sách khách hàng</h2>

<div id="customers" class="grid"></div>

<div class="pagination">

<button onclick="prevPage()">Previous</button>

<span id="pageInfo"></span>

<button onclick="nextPage()">Next</button>

</div>

</div>

<script>

const TOKEN = "Bearer eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpZCI6Miwicm9sZSI6IkN1c3RvbWVyIiwiaWF0IjoxNzczMDUwMDU1LCJleHAiOjE3NzMxMzY0NTV9.5vCywzBVccgD9BeoHT6y5SCErpjC_Hhi7zJoVdIiQy0";

let currentPage = 1;
let totalPages = 1;

function loadCustomers(page){

fetch(`http://localhost:3000/api/v1/customers?page=${page}`,{
headers:{
"Authorization":TOKEN
}
})
.then(res=>res.json())
.then(data=>{

const customers = data.result.data;

totalPages = data.result.totalPages;
currentPage = data.result.page;

renderCustomers(customers);

document.getElementById("pageInfo").innerText =
`Page ${currentPage} / ${totalPages}`;

})
.catch(err=>{
console.error(err);
});

}

function renderCustomers(customers){

const html = customers.map(c=>{

return `
<div class="card">

<img class="avatar" src="${c.Avatar}" />

<div class="name">${c.TenKhachHang}</div>

<div class="info">📱 ${c.SDT || ""}</div>

<div class="info">📍 ${c.DiaChi || ""}</div>

<hr>

<div class="info">👤 ${c.TaiKhoan?.Username}</div>

<div class="info">📧 ${c.TaiKhoan?.Email}</div>

</div>
`;

}).join("");

document.getElementById("customers").innerHTML = html;

}

function nextPage(){

if(currentPage < totalPages){
loadCustomers(currentPage + 1);
}

}

function prevPage(){

if(currentPage > 1){
loadCustomers(currentPage - 1);
}

}

loadCustomers(1);

</script>

</body>
</html>
